name: Deploy Website

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install sshpass
      run: sudo apt-get update && sudo apt-get install -y sshpass
      
    - name: Setup SSH with password
      run: |
        mkdir -p ~/.ssh
        echo "StrictHostKeyChecking no" >> ~/.ssh/config
        
    - name: Deploy to Production  
      run: |
        echo "🦀 Deploying master branch to danielnhill.com"
        sshpass -p '${{ secrets.SSH_PASSWORD }}' ssh danielnh@143.95.39.87 << 'EOF'
          cd public_html
          git pull origin master
          echo "Live site updated: $(date)"
        EOF