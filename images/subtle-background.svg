<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="bg-pattern" x="0" y="0" width="120" height="120" patternUnits="userSpaceOnUse">
      
      <!-- WhatsApp style dots -->
      <circle cx="30" cy="30" r="1" fill="#e2e8f0" opacity="0.3"/>
      <circle cx="90" cy="30" r="1" fill="#e2e8f0" opacity="0.3"/>
      <circle cx="60" cy="60" r="1" fill="#e2e8f0" opacity="0.3"/>
      <circle cx="30" cy="90" r="1" fill="#e2e8f0" opacity="0.3"/>
      <circle cx="90" cy="90" r="1" fill="#e2e8f0" opacity="0.3"/>
      
      <!-- Clear brain/neural network -->
      <g opacity="0.15">
        <circle cx="20" cy="20" r="2" fill="#6366f1"/>
        <circle cx="35" cy="15" r="1.5" fill="#6366f1"/>
        <circle cx="25" cy="35" r="1.5" fill="#6366f1"/>
        <line x1="20" y1="20" x2="35" y2="15" stroke="#6366f1" stroke-width="0.5"/>
        <line x1="20" y1="20" x2="25" y2="35" stroke="#6366f1" stroke-width="0.5"/>
        <line x1="35" y1="15" x2="25" y2="35" stroke="#6366f1" stroke-width="0.5" opacity="0.5"/>
      </g>
      
      <!-- Clear cat face -->
      <g opacity="0.12">
        <ellipse cx="95" cy="25" rx="8" ry="6" fill="#f472b6"/>
        <path d="M87,21 L89,19 M103,19 L101,21" stroke="#f472b6" stroke-width="1" fill="none"/>
        <circle cx="92" cy="23" r="0.5" fill="#ec4899"/>
        <circle cx="98" cy="23" r="0.5" fill="#ec4899"/>
        <path d="M95,26 Q97,28 95,28 Q93,28 95,26" stroke="#ec4899" stroke-width="0.5" fill="none"/>
      </g>
      
      <!-- Clearer circuit board -->
      <g opacity="0.1">
        <rect x="15" y="95" width="15" height="6" rx="1" fill="#64748b"/>
        <rect x="35" y="95" width="8" height="6" rx="1" fill="#64748b"/>
        <line x1="10" y1="98" x2="15" y2="98" stroke="#64748b" stroke-width="1"/>
        <line x1="30" y1="98" x2="35" y2="98" stroke="#64748b" stroke-width="1"/>
        <line x1="43" y1="98" x2="48" y2="98" stroke="#64748b" stroke-width="1"/>
        <circle cx="32" cy="98" r="1" fill="#64748b"/>
      </g>
      
      <!-- Retro game pixels -->
      <g opacity="0.15">
        <rect x="80" y="95" width="4" height="4" fill="#ff6b6b"/>
        <rect x="85" y="95" width="4" height="4" fill="#4ecdc4"/>
        <rect x="90" y="95" width="4" height="4" fill="#feca57"/>
        <rect x="80" y="100" width="4" height="4" fill="#48dbfb"/>
        <rect x="85" y="100" width="4" height="4" fill="#ff9ff3"/>
        <rect x="90" y="100" width="4" height="4" fill="#54a0ff"/>
      </g>
      
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg-pattern)"/>
</svg>