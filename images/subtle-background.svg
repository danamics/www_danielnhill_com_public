<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="bg-pattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <!-- Scattered dots -->
      <circle cx="20" cy="20" r="1" fill="#e2e8f0" opacity="0.4"/>
      <circle cx="80" cy="30" r="1" fill="#e2e8f0" opacity="0.3"/>
      <circle cx="30" cy="70" r="1" fill="#e2e8f0" opacity="0.4"/>
      <circle cx="70" cy="80" r="1" fill="#e2e8f0" opacity="0.3"/>
      
      <!-- Neural network elements -->
      <circle cx="15" cy="15" r="3" fill="none" stroke="#ddd6fe" stroke-width="0.5" opacity="0.3"/>
      <line x1="15" y1="15" x2="25" y2="25" stroke="#ddd6fe" stroke-width="0.3" opacity="0.2"/>
      
      <!-- Circuit elements -->
      <rect x="60" y="10" width="8" height="4" rx="1" fill="none" stroke="#e2e8f0" stroke-width="0.5" opacity="0.3"/>
      <line x1="55" y1="12" x2="60" y2="12" stroke="#e2e8f0" stroke-width="0.5" opacity="0.3"/>
      
      <!-- Cat shape -->
      <path d="M10,80 Q15,75 20,80 Q15,85 10,80 Z" fill="#fce7f3" opacity="0.15"/>
      <circle cx="12" cy="78" r="0.5" fill="#f3e8ff" opacity="0.3"/>
      <circle cx="18" cy="78" r="0.5" fill="#f3e8ff" opacity="0.3"/>
      
      <!-- Arcade pixels -->
      <rect x="85" y="85" width="3" height="3" fill="#fef3c7" opacity="0.2"/>
      <rect x="90" y="85" width="3" height="3" fill="#dbeafe" opacity="0.2"/>
      <rect x="85" y="90" width="3" height="3" fill="#fecaca" opacity="0.2"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg-pattern)"/>
</svg>